services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kevin
      POSTGRES_PASSWORD: kevin
      POSTGRES_DB: kevin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kevin -d kevin"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      KEVIN_DATABASE_URL: postgresql+psycopg://kevin:kevin@db:5432/kevin
      KEVIN_HOST: 0.0.0.0
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
